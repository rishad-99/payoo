<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- Tailwind + Daisy Ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome connected -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-[450px] bg-[#f4f5f7] mx-auto">
    <header class="border-b-2 border-b-[#08080821] bg-white sticky top-0">
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex">
          <div class="logo w-15">
            <img src="./assets/logo.png" alt="logo" />
          </div>
          <div class="balance-info pl-2">
            <h2 class="text-2xl font-bold gap-1">$ <span id="balance">45000</span></h2>
            <p class="text-neutral/50 gap-1">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <div class="logout-btn">
            <a
              href="./index.html"
              class="btn btn-soft bg-transparent border border-[#08080820]"
              ><i class="fa-solid fa-arrow-right-from-bracket"></i>Log out</a
            >
          </div>
        </div>
      </section>
    </header>

    <section class="bg-white rounded-b-3xl">
      <main class="w-11/12 py-10 space-y-5 mx-auto">
        <h2 class="text-3xl font-bold">
          Welcome to Pay<span class="text-primary">oo</span>
        </h2>
        <p class="text-neutral/50">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </main>

      <div class="buttons grid grid-cols-3 gap-3 py-5 mx-3">
        <div class="btn flex flex-col py-4 h-full bg-transparent rounded-xl">
          <img src="./assets/opt-1.png" alt="button" />
          <p class="text-[14px] font-normal text-[#08080870]">Add money</p>
        </div>
        <div class="btn flex flex-col py-4 h-full bg-transparent rounded-xl">
          <img src="./assets/opt-2.png" alt="button" />
          <p class="text-[14px] font-normal text-[#08080870]">Cash out</p>
        </div>
        <div class="btn flex flex-col py-4 h-full bg-transparent rounded-xl">
          <img src="./assets/opt-3.png" alt="button" />
          <p class="text-[14px] font-normal text-[#08080870]">Transfer money</p>
        </div>
        <div class="btn flex flex-col py-4 h-full bg-transparent rounded-xl">
          <img src="./assets/opt-4.png" alt="button" />
          <p class="text-[14px] font-normal text-[#08080870]">Get bonus</p>
        </div>
        <div class="btn flex flex-col py-4 h-full bg-transparent rounded-xl">
          <img src="./assets/opt-5.png" alt="button" />
          <p class="text-[14px] font-normal text-[#08080870]">Pay bill</p>
        </div>
        <div class="btn flex flex-col py-4 h-full bg-transparent rounded-xl">
          <img src="./assets/opt-6.png" alt="button" />
          <p class="text-[14px] font-normal text-[#08080870]">Transactions</p>
        </div>
      </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto py-5">
      <h2 class="text-xl font-bold">Cashout</h2>
      <div class="form">
        <div class="card bg-base-100 w-full shadow rounded-2xl mt-4">
          <div class="card-body">
            <fieldset class="fieldset">
              <label class="label text-[#080808] text-[16px] font-medium"
                >Agent Number</label
              >
              <input
                id="cashout-number"
                maxlength="11"
                minlength="11"
                type="text"
                class="input rounded-full bg-[#f4f5f7] w-full border-none py-6"
                placeholder="Enter 11 digit number"
              />
              <label class="label text-[#080808] text-[16px] font-medium"
                >Amount</label
              >
              <input
                id="cashout-amount"
                maxlength="11"
                minlength="11"
                type="text"
                class="input rounded-full bg-[#f4f5f7] w-full border-none py-6"
                placeholder="Enter amount to withdraw"
              />
              <label class="label text-[#080808] text-[16px] font-medium"
                >Pin Number</label
              >
              <input
                id="cashout-pin"
                maxlength="4"
                minlength="4"
                type="password"
                class="input rounded-full bg-[#f4f5f7] w-full border-none py-6"
                placeholder="Enter 4 Digit Pin Number"
              />
              <button
                id="cashout-btn"
                class="btn btn-neutral mt-4 bg-[#3B25C1] rounded-full text-[20px] font-semibold py-6"
              >
                Withdraw Money
              </button>
            </fieldset>
          </div>
        </div>
      </div>
    </section>

    <script src="./script/machine.js"></script>

    <script src="./script/cashout.js"></script>
  </body>
</html>
